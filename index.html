    <style>
        /* ===== RESET & BASE ===== */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Impact', 'system-ui', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;

            padding: 0;
            margin: 0;
        }

        /* ===== TYPOGRAPHY ===== */
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Impact', 'system-ui', sans-serif;
            text-transform: uppercase;
            letter-spacing: -0.02em;

        }

        h1 {
            font-size: clamp(3.5rem, 12vw, 8rem);
            color: #ffffff;
            text-shadow: 6px 6px 0 #ff3b00;

            padding-bottom: 0.1em;
            margin-bottom: 24px;

        h2 {

            border-left: 8px solid #ffffff;
            padding-left: 24px;
            margin-bottom: 32px;
            transform: skewX(-3deg);
        }

        h3 {
            font-size: 2.2rem;
            color: #ffffff;
            margin-bottom: 16px;
        }

        p, li, blockquote {
            font-family: 'system-ui', 'Helvetica Neue', sans-serif;
            font-size: 1.2rem;
            line-height: 1.5;
            font-weight: 300;
            color: #dddddd;
        }

        a {
            color: #ff3b00;
            text-decoration: none;
            border-bottom: 3px solid transparent;
            transition: border-color 0.15s ease;
        }

        a:hover, a:focus {
            border-bottom-color: #ffffff;
        }

        strong, b {
            font-weight: 700;
            color: #ffffff;
        }

        /* ===== LAYOUT : AIRY ===== */
        .container {
            width: 100%;
            max-width: 1440px;
            margin: 0 auto;
            padding: 0 72px;
        }

        section {
            margin-bottom: 120px;
            padding: 72px 0;
        }

        .section-gap {
            height: 120px;
            width: 100%;
        }

        /* ===== BRUTALIST BORDERS / TEXTURES ===== */

            border: 4px solid #ffffff;
            padding: 32px;
            background-color: #111111;
            box-shadow: 8px 8px 0 #ff3b00;
        }

        .brutal-border-thin {
            border: 3px solid #ff3b00;
            padding: 20px;
            background-color: #0a0a0a;
        }

        .brutal-rotate {
            transform: rotate(1.5deg);
        }

        .brutal-skew {
            transform: skewX(-2deg);
        }

        /* ===== HEADER / NAV ===== */
        header {
            padding: 32px 72px;
            border-bottom: 4px solid #ff3b00;
            background-color: #000000;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 10;
        }

        .logo {
            font-family: 'Impact', sans-serif;
            font-size: 2.8rem;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: -0.03em;
            transform: rotate(-2deg);
            border: 3px solid #ff3b00;
            padding: 8px 20px;
            background-color: #000000;
            display: inline-block;
        }

        .logo span {
            color: #ff3b00;
        }

        nav {
            display: flex;
            align-items: center;
            gap: 48px;
        }

        nav a {
            font-family: 'Impact', sans-serif;
            font-size: 1.3rem;
            text-transform: uppercase;
            color: #ffffff;
            border-bottom: 3px solid transparent;
            padding-bottom: 4px;
            letter-spacing: 0.1em;
        }

        nav a:hover {
            border-bottom-color: #ff3b00;
            color: #ff3b00;
        }

        /* Hamburger (mobile) */
        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 6px;
            background: none;
            border: none;
            padding: 8px;
        }

        .hamburger span {
            display: block;
            width: 36px;
            height: 4px;
            background-color: #ffffff;
            border-radius: 0;
            transition: 0.2s;
        }

        .mobile-menu {
            display: none;
            width: 100%;
            flex-direction: column;
            background-color: #0a0a0a;
            border-top: 3px solid #ff3b00;
            padding: 24px 0;
            gap: 16px;
            margin-top: 16px;
        }

        .mobile-menu a {
            font-family: 'Impact', sans-serif;
            font-size: 1.8rem;
            color: #ffffff;
            padding: 8px 24px;
            border-left: 6px solid #ff3b00;
        }

        /* ===== HERO ===== */
        #hero {
            position: relative;
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 120px 24px;
            background: 
                linear-gradient(135deg, #000000 0%, #1a0000 40%, #000000 100%);
            border-bottom: 6px solid #ff3b00;
            overflow: hidden;
        }

        #hero::before {
            content: '';
            position: absolute;
            top: -10%;
            left: -10%;
            width: 120%;
            height: 120%;
            background: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 20px,
                rgba(255,59,0,0.03) 20px,
                rgba(255,59,0,0.03) 22px
            );
            pointer-events: none;
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 1200px;
        }

        .hero-content h1 {
            font-size: clamp(4rem, 14vw, 9rem);
            transform: rotate(-3deg) scale(1.05);
            margin-bottom: 16px;
            border: none;
            text-shadow: 8px 8px 0 #ff3b00, 12px 12px 0 rgba(255,59,0,0.3);
        }

        .hero-sub {
            font-family: 'Impact', sans-serif;
            font-size: 2rem;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            border-top: 4px solid #ff3b00;
            border-bottom: 4px solid #ff3b00;
            display: inline-block;
            padding: 16px 32px;
            transform: skewX(-5deg);
            margin-top: 20px;
            background: rgba(0,0,0,0.7);
        }

        .hero-cta {
            margin-top: 64px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 40px;
            align-items: center;
        }

        .hero-cta a {
            font-family: 'Impact', sans-serif;
            font-size: 2.2rem;
            background-color: #ff3b00;
            color: #000000;
            padding: 20px 48px;
            border: 4px solid #ffffff;
            text-transform: uppercase;
            transform: rotate(1deg);
            box-shadow: 8px 8px 0 #ffffff;
            transition: 0.1s linear;
        }

        .hero-cta a:hover {
            background-color: #000000;
            color: #ff3b00;
            border-color: #ff3b00;
            box-shadow: 8px 8px 0 #ff3b00;
            transform: rotate(-1deg) scale(1.02);
        }

        .hero-cta .tel-badge {
            font-size: 2rem;
            background: #000000;
            border: 3px solid #ffffff;
            padding: 16px 32px;
            color: #ff3b00;
            transform: rotate(-2deg);
            font-family: 'system-ui', monospace;
            font-weight: bold;
        }

        /* ===== SECTION: INTRO ===== */
        .intro-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 48px;
            align-items: start;
        }

        .intro-badge {
            border: 4px solid #ff3b00;
            padding: 48px;
            background: #0f0f0f;
            transform: rotate(1deg);
        }

        .intro-badge h2 {
            border-left: none;
            padding-left: 0;
            transform: none;
            border-bottom: 4px solid #ffffff;
            padding-bottom: 16px;
        }

        .intro-text p {
            font-size: 1.4rem;
            margin-bottom: 24px;
        }

        .intro-text .highlight {
            color: #ff3b00;
            font-weight: 700;
            background: #000000;
            padding: 4px 12px;
            border: 2px solid #ffffff;
            display: inline-block;
        }

        /* ===== SECTION: REVIEWS ===== */
        .reviews-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 48px;
            margin-top: 48px;
        }

        .review-card {
            background: #0a0a0a;
            border: 4px solid #ffffff;
            padding: 32px 24px;
            transform: rotate(var(--rot, 0deg));
            box-shadow: 6px 6px 0 #ff3b00;
            transition: transform 0.1s;
        }

        .review-card:nth-child(odd) {
            --rot: -1deg;
        }

        .review-card:nth-child(even) {
            --rot: 1.5deg;
        }

        .review-card:hover {
            transform: rotate(0deg) scale(1.02);
            border-color: #ff3b00;
        }

        .review-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'system-ui', monospace;
            font-size: 0.9rem;
            color: #aaaaaa;
            border-bottom: 2px solid #333;
            padding-bottom: 12px;
            margin-bottom: 16px;
        }

        .review-meta .stars {
            color: #ff3b00;
            font-size: 1.4rem;
            letter-spacing: 2px;
        }

        .review-card blockquote {
            font-size: 1.1rem;
            color: #dddddd;
            font-style: normal;
            border-left: 4px solid #ff3b00;
            padding-left: 16px;
        }

        .review-card .nick {
            font-weight: 700;
            color: #ffffff;
        }

        /* ===== SECTION: LOCATION / CTA ===== */
        .cta-block {
            background-color: #0a0a0a;
            border: 6px solid #ff3b00;
            padding: 80px 48px;
            text-align: center;
            transform: rotate(-0.5deg);
            box-shadow: 12px 12px 0 #ffffff;
        }

        .cta-block h2 {
            border-left: none;
            padding-left: 0;
            transform: none;
            font-size: 3.5rem;
            color: #ffffff;
        }

        .cta-block .cta-phone {
            font-size: 3rem;
            font-family: 'system-ui', monospace;
            font-weight: bold;
            color: #ff3b00;
            display: block;
            margin: 32px 0;
            border: 4px solid #ffffff;
            padding: 24px;
            background: #000000;
            transform: rotate(1deg);
        }

        .cta-block .cta-phone a {
            color: #ff3b00;
            border: none;
        }

        .cta-block .cta-phone a:hover {
            color: #ffffff;
        }

        /* ===== FOOTER ===== */
        footer {
            border-top: 6px solid #ff3b00;
            padding: 48px 72px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 32px;
            background: #050505;
        }

        footer p {
            font-size: 1rem;
            color: #888888;
            font-family: 'system-ui', monospace;
        }

        footer a {
            color: #ffffff;
            border-bottom: 2px solid #ff3b00;
        }

        .footer-badge {
            font-family: 'Impact', sans-serif;
            font-size: 1.6rem;
            color: #ff3b00;
            border: 3px solid #ffffff;
            padding: 8px 24px;
            transform: rotate(1deg);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .container {
                padding: 0 24px;
            }

            header {
                padding: 24px;
            }

            nav {
                display: none;
            }

            .hamburger {
                display: flex;
            }

            .mobile-menu.open {
                display: flex;
            }

            .intro-grid {
                grid-template-columns: 1fr;
                gap: 32px;
            }

            h1 {
                font-size: 2.8rem;
                transform: rotate(-2deg);
            }

            h2 {
                font-size: 2.4rem;
            }

            section {
                padding: 48px 0;
                margin-bottom: 80px;
            }

            .hero-content h1 {
                font-size: clamp(3rem, 12vw, 5rem);
            }

            .hero-sub {
                font-size: 1.4rem;
                padding: 12px 20px;
            }

            .hero-cta a {
                font-size: 1.6rem;
                padding: 16px 32px;
            }

            .cta-block {
                padding: 40px 24px;
            }

            .cta-block .cta-phone {
                font-size: 2rem;
                padding: 16px;
            }

            footer {
                padding: 32px 24px;
                flex-direction: column;
                text-align: center;
            }

            .brutal-border {
                padding: 24px;
            }

            .reviews-grid {
                grid-template-columns: 1fr;
            }
        }

        /* ===== UTILITIES ===== */
        .text-accent {
            color: #ff3b00;
        }

        .bg-accent {
            background-color: #ff3b00;
            color: #000000;
        }

        .border-accent {
            border-color: #ff3b00;
        }

        .rotate-1 {
            transform: rotate(1deg);
        }

        .rotate-neg1 {
            transform: rotate(-1deg);
        }

        .skew-x {
            transform: skewX(-3deg);
        }

        .mt-48 {
            margin-top: 48px;
        }

        .mb-48 {
            margin-bottom: 48px;
        }

        .gap-48 {
            gap: 48px;
        }

        .full-bleed {
            width: 100vw;
            margin-left: calc(50% - 50vw);
        }
    </style>
</head>
